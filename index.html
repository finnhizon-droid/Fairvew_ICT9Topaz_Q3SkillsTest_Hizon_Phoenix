<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <style>

        body {
            background-image: url('https://images-ext-1.discordapp.net/external/5EpOOlOtFv05P9F1FYFe5q2IYkXk6-aZ3DlPJA4pQVs/https/cdn.room58.com/2023/01/16/682834760b0e89a6557ff63f5d48a176_7b22f13114835ba6.png?format=webp&quality=lossless&width=1540&height=693');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }

        .navbar-brand img {
            width: 48px;
            height: 48px;
            object-fit: cover;
        }
        
        .navbar {
            padding-top: 0.25rem;
            padding-bottom: 0.25rem;
            background-color: rgba(10, 20, 30, 0.9);
        }

        .title {
            color: white;
            font-weight: 700;
        }

        .description {
            background-color: rgba(10, 20, 30, 0.9);
            padding: 67px;
            border-radius: 16px;
            font-size: 20px;
        }

        h1 {
            color: white;
            font-weight: 700;
        }

        .submit {
            font-weight: 700;
            color: white;
            background-color: #325ea8;
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none
        }
        .submit:hover {
            background-color: #4a86e8;
        }
        .submit:active {
            background-color: #4a86e8;
        }

        .nav-link {
            color: #8f8d8d;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: white;
        }

        .formmm {
            background-color: rgba(10, 20, 30, 0.9);
            color: white;
            border-radius: 16px;
            font-weight: 400;
        }

        .formmm h4 {
            color: #325ea8;
        }

        .pfp {
            color: #4a86e8;
            padding: 11px;
            text-decoration: underline;
            cursor: pointer;
        }

        

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="https://i.pinimg.com/736x/65/b4/ad/65b4ad928830ec0ed3e24c0403213bf4.jpg" alt="swiftylogo" class="rounded-circle ms-0">
            <span class="title ms-2">SWIFTY</span>
        </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page2.html">Register</a>
                    </li>
                </ul>

                <form class="d-flex">
                    <input class="form-control me-2" type="text" placeholder="Search">
                    <button class="btn btn-outline-primary" type="button">Search</button>
                </form>
            </div>
        </div>
    </nav>

    <br><br>

    <div class="container p-4 rounded formmm">
        <h1> Register Now </h1>
      <form>
            <input id="profile" type="file" accept="image/*" style="display:none">
            <label for="profile" class="pfp">
                Click here to choose a profile picture (optional)
            </label>

            <h4>Basic Information</h4>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" required placeholder="Enter name...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Birthday</label>
                    <input type="date" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Gender</label>
                    <select class="form-select" required>
                        <option disabled selected>Select gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Non-Binary</option>
                        <option>Trasgender</option>
                    </select>
                </div>
            </div>
            <br>
            <h4>Contact Information</h4>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" class="form-control" required placeholder="63+">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Personal Email</label>
                    <input type="email" class="form-control" required placeholder="example@email.com">
                </div>
            </div>
            <br>

            <h4>Additional Details</h4>
            
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">City of Residence</label>
                    <input type="text" class="form-control" required placeholder="Novaliches, Quezon City...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required placeholder="Enter Username...">
                </div>
            </div>

            <a type="button" class="submit w-25 text-center mx-auto d-block" href="page3.html">Submit Registration</a>
      </form>
    </div>

    <br>
    <br>

</body>

</html>
